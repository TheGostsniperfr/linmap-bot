apiVersion: v1
kind: Secret
metadata:
  name: {{ include "linmap-bot.fullname" . }}-secrets
  labels:
    {{- include "linmap-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Secrets passed securely at release time (e.g. via helm install --set)
  LINEAR_API_KEY: ""
  DISCORD_TOKEN: ""
  {{- if eq .Values.googleCredentials.mode "env" }}
  GOOGLE_APPLICATION_CREDENTIALS: ""
  {{- else }}
  GOOGLE_APPLICATION_CREDENTIALS_JSON: ""
  {{- end }}
