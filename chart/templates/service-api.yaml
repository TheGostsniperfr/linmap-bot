apiVersion: v1
kind: Service
metadata:
  name: {{ include "linmap-bot.fullname" . }}-api
  labels:
    {{- include "linmap-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: {{ include "linmap-bot.fullname" . }}-api
